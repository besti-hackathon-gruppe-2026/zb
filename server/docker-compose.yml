services:
  mysql:
    image: mysql
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: IeP8aiji
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: IeP8aiji
    ports:
      - "3306:3306" # for development
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal

  mitmproxy:
    build: mitmproxy-container
    ports:
      - "8080:8080"
    environment:
      CLASSROOM_ID: 1
      MYSQL_HOST: mysql_db
      MYSQL_PORT: 3306
      MYSQL_USER: myuser
      MYSQL_PASSWORD: IeP8aiji
      MYSQL_DATABASE: mydatabase
    networks:
      - internal

  dns:
    image: coredns/coredns
    command: -conf /etc/coredns/Corefile
    volumes:
      - "./dns/Corefile:/etc/coredns/Corefile"
    ports:
      - "53:53/udp"

  backend:
    build: server-backend
    ports:
      - "8000:8000"
    networks:
      - internal
    environment:
      CLASSROOM_ID: 1
      DB_HOST: mysql_db
      DB_USER: myuser
      DB_PASSWORD: IeP8aiji
      DB_DATABASE: mydatabase

networks:
  internal:

volumes:
  mysql_data: